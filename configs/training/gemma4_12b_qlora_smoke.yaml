{
  "version": 1,
  "experiment": "anchor-moe-lora-task-routed",
  "model": {
    "id": "${ANCHOR_BASE_MODEL_ID:-google/gemma-4-12B}",
    "revision": "${ANCHOR_BASE_MODEL_REVISION:-56820d7d8cbe8e47975a53325439ed272e91cff2}",
    "local_path": "models/google-gemma-4-12B-base",
    "processor_id": "${ANCHOR_PROCESSOR_ID:-google/gemma-4-12B-it}",
    "processor_revision": "${ANCHOR_PROCESSOR_REVISION:-main}",
    "family": "gemma-4-12b-unified",
    "architecture": "multimodal_lm",
    "training_format": "transformers_or_peft_4bit",
    "load_strategy": "${ANCHOR_MODEL_LOAD_STRATEGY:-bnb_nf4_online}",
    "trust_remote_code": false
  },
  "quantization": {
    "mode": "qlora",
    "load_in_4bit": true,
    "quant_type": "nf4",
    "double_quant": true,
    "compute_dtype": "bfloat16",
    "quant_storage_dtype": "bfloat16",
    "freeze_base_model": true
  },
  "lora": {
    "rank": 16,
    "alpha": 32,
    "dropout": 0.05,
    "bias": "none",
    "task_type": "CAUSAL_LM",
    "target_modules": ["q_proj", "v_proj"],
    "dtype": "bfloat16"
  },
  "training": {
    "max_seq_length": 256,
    "max_steps": 8,
    "per_device_train_batch_size": 1,
    "gradient_accumulation_steps": 4,
    "gradient_checkpointing": true,
    "learning_rate": 0.0002,
    "warmup_ratio": 0.03,
    "lr_scheduler_type": "constant_with_warmup",
    "optim": "paged_adamw_8bit",
    "logging_steps": 1,
    "save_steps": 4,
    "save_total_limit": 2,
    "report_to": "none",
    "seed": 20260710
  },
  "adapters": {
    "planner": {
      "datasets": ["data/automated_v2/data_plan.jsonl"],
      "expected_experts": ["planner"]
    },
    "tool_policy": {
      "datasets": ["data/automated_v2/data_tool_policy.jsonl"],
      "expected_experts": ["tool_policy"]
    },
    "frontend_gen": {
      "datasets": ["data/automated_v2/data_frontend.jsonl"],
      "expected_experts": ["frontend_gen"]
    },
    "frontend_review": {
      "datasets": ["data/automated_v2/data_review.jsonl"],
      "expected_experts": ["frontend_review"]
    },
    "security_gate": {
      "datasets": ["data/automated_v2/data_security.jsonl"],
      "expected_experts": ["security_gate"]
    },
    "mixed_all": {
      "datasets": [
        "data/automated_v2/data_plan.jsonl",
        "data/automated_v2/data_tool_policy.jsonl",
        "data/automated_v2/data_frontend.jsonl",
        "data/automated_v2/data_review.jsonl",
        "data/automated_v2/data_security.jsonl"
      ],
      "expected_experts": [
        "planner",
        "tool_policy",
        "frontend_gen",
        "frontend_review",
        "security_gate"
      ]
    }
  },
  "paths": {
    "project_root": "../..",
    "manifest_dir": "artifacts/manifests",
    "adapter_dir": "artifacts/adapters"
  },
  "guardrails": {
    "minimum_gpu_memory_gib": 11.0,
    "reject_deployment_artifacts_for_training": true
  },
  "scale_gate": {
    "required_datasets": {
      "planner": "data/live_smoke/data_plan.jsonl",
      "tool_policy": "data/live_smoke/data_tool_policy.jsonl",
      "frontend_gen": "data/live_smoke/data_frontend.jsonl",
      "frontend_review": "data/live_smoke/data_review.jsonl",
      "security_gate": "data/live_smoke/data_security.jsonl"
    },
    "base_artifact": {
      "repo_id": "google/gemma-4-12B",
      "revision": "56820d7d8cbe8e47975a53325439ed272e91cff2",
      "local_path": "models/google-gemma-4-12B-base",
      "download_manifest": "anchor_download_manifest.json",
      "weight_file": "model.safetensors",
      "bytes": 23919549408,
      "sha256": "fe054ae05ff7f44318fd8ae90d58992531455c7ed31356704088f0f2d8c8009a"
    },
    "minimum_free_vram_gib": 10.5,
    "minimum_free_host_memory_gib": 12.0,
    "heldout_cases": "configs/training/heldout_cases.jsonl",
    "required_smoke_gate_manifest": "artifacts/manifests/smoke-gate-frontend_gen-r16.execute.json"
  }
}
