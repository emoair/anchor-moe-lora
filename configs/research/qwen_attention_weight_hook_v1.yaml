adapter:
  path: artifacts/diagnostics/qwen2_5_1_5b_synthetic_scaffold_budget_matched_q_plus_o_step80
  profile: q_plus_o
  expected_adapter_config_sha256: 17af30108f7163bc30773d5d53e7847fd51f6e3faaf779f4f79f84e368883222
