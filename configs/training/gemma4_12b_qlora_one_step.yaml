{
  "extends": "gemma4_12b_qlora_smoke.yaml",
  "overrides": {
    "experiment": "anchor-moe-lora-one-sample-one-step-gate",
    "training": {
      "max_seq_length": 64,
      "minimum_backward_free_vram_mib": 256,
      "max_steps": 1,
      "per_device_train_batch_size": 1,
      "gradient_accumulation_steps": 1,
      "logging_steps": 1,
      "save_steps": 1,
      "save_total_limit": 1,
      "report_to": "none"
    },
    "adapters": {
      "planner": {
        "datasets": ["data/live_smoke/data_plan.jsonl"]
      },
      "tool_policy": {
        "datasets": ["data/live_smoke/data_tool_policy.jsonl"]
      },
      "frontend_gen": {
        "datasets": ["data/live_smoke/data_frontend.jsonl"]
      },
      "frontend_review": {
        "datasets": ["data/live_smoke/data_review.jsonl"]
      },
      "security_gate": {
        "datasets": ["data/live_smoke/data_security.jsonl"]
      },
      "mixed_all": {
        "datasets": [
          "data/live_smoke/data_plan.jsonl",
          "data/live_smoke/data_tool_policy.jsonl",
          "data/live_smoke/data_frontend.jsonl",
          "data/live_smoke/data_review.jsonl",
          "data/live_smoke/data_security.jsonl"
        ]
      }
    }
  }
}
