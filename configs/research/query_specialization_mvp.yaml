schema_version: anchor.query-specialization-experiment.v1
claim_scope: experimental_proxy_scaffold_only

dataset_contract:
  root: fixtures/research/taskboard_projector
  manifest: fixtures/research/taskboard_projector/manifest.json
  files:
    - train/clean.jsonl
    - train/noisy.jsonl
    - calibration/clean.jsonl
  sidecar_schema: configs/research/taskboard_projector_sidecar.schema.json
  manifest_schema: configs/research/taskboard_projector_manifest.schema.json
  segment_plan_schema: configs/research/hierarchical_task_kv_segment_plan.schema.json
  projector_config: configs/research/swebench_taskboard_projector_v2.yaml
  expected_sidecar_schema_sha256: c1863bfab69ce2f2388ee37fadae951b14f3d5120706bab032cab3f9aab6bdc5
  expected_manifest_schema_sha256: 2cd9dc98d2b2865ed0586abfe291e3f6d161686597fcd2a7884c5762d2195347
  expected_segment_plan_schema_sha256: 80f760497e0d21f7d4d532db758362a800e845e6919b18b23958caabc7f155bf
  expected_projector_config_sha256: b36945a2693183f0b213da403afcf8bb5611f46298bb849434e7b7d5854ba943
  split_group_key: task_bundle_sha256
  require_clean_noisy_pairs: true
  require_disjoint_source_tasks: true
  require_all_role_views: true
  hard_exclude_forbidden_blocks: true
  canonical_gold_written: false
  provider_requests: 0
  heldout_content_read: false
  heldout_content_emitted: false
  split_preserved: true
  augmentation_applied_after_split: true

materialization:
  schema_version: anchor.query-specialization-sft-view.v1
  record_schema: configs/research/query_specialization_sft_view.schema.json
  output_root: artifacts/research/query_specialization/materialized_sft
  max_shard_bytes: 48000000
  require_train_and_calibration_for_q1_smoke: true

# Every field in this section is consumed by the tiny CPU surrogate. It does
# not load or fine-tune a language model and it does not test JSON generation.
proxy:
  profile: q_only
  hidden_size: 48
  rank: 4
  alpha: 8
  seed: 20260720
  train_tasks: 24
  eval_tasks: 12
  epochs: 300
  learning_rate: 0.03
  attention_temperature: 0.2
  task_variation: 0.08
  distractor_copies: 3
  losses:
    distractor_weight: 0.25
    clean_noisy_consistency_weight: 0.1
  metrics_schema: configs/research/query_specialization_metrics.schema.json
  output: artifacts/research/query_specialization/mvp_probe.json
  signal_thresholds:
    minimum_top1_relevant_rate: 0.8
    minimum_relevant_mass_gain: 0.1
    minimum_mean_min_relevant_block_mass: 0.15
    maximum_distractor_mass: 0.12
    minimum_correct_role_mass_gap: 0.005
    minimum_clean_noisy_query_cosine: 0.98

# Reserved, disabled plan for a later foundation-model experiment. None of
# these values are consumed by the CPU proxy above.
full_model_followup:
  enabled: false
  # A real frozen formal-v3 release does not exist yet.  This explicit state is
  # fail-closed: setting enabled=true also requires status=ready plus a pinned,
  # authenticated producer release directory and manifest digest.
  release_lock:
    status: unavailable
    root: null
    schema: configs/research/generic_train_release_lock.schema.json
    expected_schema_sha256: 119c55279c48246d45808849b03b9b6873570bcb82103da129ea64812fd3b5aa
    source_disjoint_schema: configs/research/swebench_source_disjoint_manifest.schema.json
    expected_source_disjoint_schema_sha256: 2a2aae532c25b324a96b929a6a396d55d051c765258a5da0ebb7547724c68f6b
    expected_manifest_sha256: null
    expected_consumer_contract_sha256: null
    expected_consumer_id: anchor.query-specialization-training-consumer
    expected_consumer_version: "1"
  base_config: configs/training/gemma4_12b_qlora_smoke.yaml
  lora:
    primary_profile: q_only
    control_profiles: [q_o]
    rank: 8
    alpha: 16
    dropout: 0.05
    dtype: bfloat16
    freeze_base_model: true
  optimization:
    learning_rate: 0.00005
    max_steps: 16
  attention_implementation: sdpa
  direct_attention_supervision: false
  token_to_block_aggregation: unimplemented
  evidence_selection_target: strict_json
