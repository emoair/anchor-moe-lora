schema_version: anchor.distill-train-handoff.config.v1
project_root: ../..
state_dir: runs/distill-train-handoff-v3

# This remains the strict execution proof. A collect-first negative is not
# accepted as execution gold and must not be promoted by the snapshot gate.
execution:
  batch_config: configs/tooling/opencode_distillation_ramp.yaml
  accepted_gold: artifacts/tooling/live_gold.accepted.jsonl
  session_candidates: artifacts/tooling/session_candidates.jsonl
  session_quarantine: artifacts/tooling/session_quarantine.jsonl
  raw_export: runs/tooling-live/capture/session.raw.json
  capture: runs/tooling-live/capture/sidecar.json
  workspace: runs/tooling-live/capture/workspace
  credential_env: KIMI_CODE_API_KEY
  minimum_accepted_gold: 1
  concurrency_stages: [1]

distillation:
  automation_config: configs/data/automation.full_v3.ark_glm52.max384.c8.yaml
  status_path: data/automated_v3/automation/status.json
  credential_env: ARK_CODING_API_KEY
  dry_run_terminal_state: provider_quota_exhausted
  dry_run_quota_epoch: offline-full-v3-handoff-check

# These paths exist only after prepare_full_v3_snapshot.py has observed a
# training_ready partition and published the five files as one atomic directory.
snapshot:
  datasets:
    planner: artifacts/formal_v3/dataset/data_plan.jsonl
    tool_policy: artifacts/formal_v3/dataset/data_tool_policy.jsonl
    frontend_gen: artifacts/formal_v3/dataset/data_frontend.jsonl
    frontend_review: artifacts/formal_v3/dataset/data_review.jsonl
    security_gate: artifacts/formal_v3/dataset/data_security.jsonl
  minimum_records_per_expert: 256
  heldout_cases: configs/benchmark/heldout_cases_v1.jsonl
  heldout_fixtures_root: examples/benchmark/fixtures
  heldout_manifest: artifacts/benchmark/heldout_v1/manifest.json
  sop_sources:
    - skills/plan.md
    - skills/tool_policy.md
    - skills/frontend.md
    - skills/review.md
    - skills/security.yaml

training:
  handoff_trigger: provider_quota_exhausted
  handoff_manifest: artifacts/formal_v3/training-handoff.json
  # Created and audited independently from this snapshot preparer.
  config: configs/training/formal_v3_lowmem_common.yaml
  adapters: [planner, tool_policy, frontend_gen, frontend_review, security_gate]
  auto_start: true
  max_parallel_gpu_jobs: 1
  logs_dir: runs/formal-v3-handoff/logs
