schema_version: anchor.complexity-adaptive-budget.v2
status: calibration_pending
base_contract_id: gemma4-12b-r56820d7-bnb-nf4-doublequant-bf16-v1
target_modules: [q_proj, v_proj]
parameters_per_rank: 649216
stages: [planner, tool_policy, frontend_gen, frontend_review, security_gate]

shared_selection:
  mechanism_id: stage_complexity_calibration_pareto_v1
  complexity_evaluator: deterministic_stage_features_v1
  data_split: calibration_only
  heldout_access: forbidden_until_allocation_frozen
  rank_menu: [1, 2, 3, 4, 6, 8, 12, 16]
  require_non_uniform_allocation: true
  freeze_manifest:
    required_before_heldout: true
    required_fields:
      - mechanism_id
      - calibration_snapshot_sha256
      - attempted_allocations
      - selected_ranks
      - materialized_trainable_parameters
      - selection_objectives
      - created_at
    immutable_after_heldout_open: true
  invariants:
    - same frozen Q4 base and tokenizer as A/B/C/D
    - same training snapshot, optimizer, seed, sequence length, and sample exposure
    - calibration selects ranks before held-out is opened
    - every attempted allocation is reported, not only the selected allocation

complexity_prior:
  highest: [frontend_gen]
  high: [frontend_review]
  medium: [planner]
  low: [tool_policy, security_gate]

arms:
  E:
    name: adaptive_pareto
    per_stage_max_rank: 16
    total_rank_constraint: null
    materialized_parameter_constraint: null
    search: pareto
    objectives:
      - maximize_per_stage_calibration_quality
      - minimize_materialized_parameters
      - minimize_routed_latency
      - minimize_peak_vram
    selection_rule: choose_only_from_calibration_pareto_front
  F:
    name: adaptive_budget_matched
    per_stage_max_rank: 16
    total_rank_constraint: 16
    materialized_parameter_constraint: 10387456
    search: pareto_under_exact_budget
    objectives:
      - maximize_per_stage_calibration_quality
      - minimize_routed_latency
      - minimize_peak_vram
    selection_rule: choose_only_from_exact_budget_calibration_pareto_front
    hard_invariants:
      - sum(selected_ranks) == 16
      - materialized_trainable_parameters == 10387456
      - materialized_trainable_parameters == B_mixed_rank16
