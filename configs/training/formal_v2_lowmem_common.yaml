{
  "extends": "formal_v1_common.yaml",
  "overrides": {
    "experiment": "anchor-moe-lora-formal-v2-lowmem",
    "training": {
      "runtime_engine": "manual_active_labels_v2",
      "sample_order": "deterministic_epoch_shuffle_v1",
      "maximum_training_peak_vram_gib": 9.0,
      "max_seq_length": 64,
      "max_steps": 15,
      "per_device_train_batch_size": 1,
      "gradient_accumulation_steps": 4,
      "gradient_checkpointing": true,
      "allow_tf32": true,
      "loss_logits": "active_labels_only",
      "minimum_backward_free_vram_mib": 256,
      "learning_rate": 0.0002,
      "warmup_ratio": 0.03,
      "lr_scheduler_type": "constant_with_warmup",
      "optim": "paged_adamw_8bit",
      "logging_steps": 1,
      "save_steps": 15,
      "save_total_limit": 1,
      "report_to": "none",
      "seed": 20260710
    },
    "paths": {
      "manifest_dir": "artifacts/formal_v2/manifests",
      "adapter_dir": "artifacts/formal_v2/C/adapters"
    },
    "scale_gate": {
      "required_smoke_gate_manifest": "artifacts/formal_v2/manifests/smoke-gate-frontend_gen-r16.execute.json"
    }
  }
}
